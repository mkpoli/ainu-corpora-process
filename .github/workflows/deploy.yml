name: Deploy to Cloudflare Workers

on:
  workflow_dispatch:
    inputs:
      publish_d1:
        description: 'Re-publish the morpheme database to D1 (creates a new ainu-mdb-<UTC-timestamp>)'
        type: boolean
        default: false

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Set up uv (only needed when re-publishing D1)
        if: ${{ inputs.publish_d1 }}
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python (only needed when re-publishing D1)
        if: ${{ inputs.publish_d1 }}
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install workspace dependencies (only needed when re-publishing D1)
        if: ${{ inputs.publish_d1 }}
        working-directory: ${{ github.workspace }}
        run: uv sync --frozen

      - name: Install web dependencies
        run: bun install --frozen-lockfile

      - name: Re-publish morpheme database to D1
        if: ${{ inputs.publish_d1 }}
        run: bun run publish:d1

      - name: Sync database (bundle JSON fallback)
        run: bun run sync:db

      - name: Type-check
        run: bun run check

      - name: Build SvelteKit (adapter-cloudflare)
        run: bun run build

      - name: Deploy with Wrangler
        run: bunx wrangler deploy
