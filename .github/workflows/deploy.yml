name: Deploy to Cloudflare Workers

on:
  # Auto-deploy on every push to main that touches the web app or the
  # underlying morpheme database (seed + ingest scripts that regenerate
  # the bundled JSON). Pushes that only touch the corpus/dictionary
  # processing tools or the morpheme paper repo don't redeploy.
  push:
    branches: [main]
    paths:
      - 'web/**'
      - 'morpheme_db/**'
      - '.github/workflows/deploy.yml'
  # Manual trigger from the Actions tab, with optional D1 re-publish.
  workflow_dispatch:
    inputs:
      publish_d1:
        description: 'Re-publish the morpheme database to D1 (creates a new ainu-mdb-<UTC-timestamp>)'
        type: boolean
        default: false

# Cancel any in-flight deploy if another commit lands on main.
concurrency:
  group: cf-workers-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    # Cloudflare credentials (CLOUDFLARE_API_TOKEN / CLOUDFLARE_ACCOUNT_ID)
    # live in the "deploy" GitHub Environment; the job must opt in to it for
    # those environment-scoped secrets to be injected.
    environment: deploy
    timeout-minutes: 15
    permissions:
      contents: read
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      # The publish-d1 input only exists on workflow_dispatch; fall back to
      # false for push events.
      PUBLISH_D1: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_d1 || false }}
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Set up uv (only needed when re-publishing D1)
        if: ${{ env.PUBLISH_D1 == 'true' }}
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python (only needed when re-publishing D1)
        if: ${{ env.PUBLISH_D1 == 'true' }}
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install workspace dependencies (only needed when re-publishing D1)
        if: ${{ env.PUBLISH_D1 == 'true' }}
        working-directory: ${{ github.workspace }}
        run: uv sync --frozen

      - name: Install web dependencies
        run: bun install --frozen-lockfile

      - name: Re-publish morpheme database to D1
        if: ${{ env.PUBLISH_D1 == 'true' }}
        run: bun run publish:d1

      - name: Sync database (bundle JSON fallback)
        run: bun run sync:db

      - name: Type-check
        run: bun run check

      - name: Build SvelteKit (adapter-cloudflare)
        run: bun run build

      - name: Deploy with Wrangler
        run: bunx wrangler deploy
